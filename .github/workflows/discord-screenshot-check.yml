name: Discordスクショを取り込んでニュース生成

on:
  workflow_dispatch:

jobs:
  check:
    name: スクショ確認・ニュース生成
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 依存パッケージをインストール
        run: npm install @anthropic-ai/sdk

      - name: Discordスクショを取り込み
        id: check
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_SCREENSHOT_CHANNEL_ID: ${{ secrets.DISCORD_SCREENSHOT_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/discord-screenshot-check.mjs

      - name: 生成されたニュースをコミット＆プッシュ
        id: commit
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"
          git add src/content/news/ src/data/discord-last-message-id.txt
          if git diff --staged --quiet; then
            echo "created=false" >> $GITHUB_OUTPUT
            echo "新しいニュースなし"
          else
            git commit -m "content: Discordスクショからニュースを自動生成 [$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')]"
            git push
            echo "created=true" >> $GITHUB_OUTPUT
            echo "✅ プッシュ完了"
          fi

      - name: Discordに取り込み結果を通知
        if: steps.commit.outputs.created == 'true'
        env:
          DISCORD_ARTICLE_WEBHOOK_URL: ${{ secrets.DISCORD_ARTICLE_WEBHOOK_URL }}
        run: |
          node - <<'EOF'
          import fs from 'fs';
          import https from 'https';

          const result = JSON.parse(fs.readFileSync('/tmp/discord-result.json', 'utf-8'));
          if (!result.created?.length) process.exit(0);

          const message = [
            `📥 **Discordスクショから${result.created.length}件のニュースを取り込みました**`,
            ``,
            result.created.map(s => `・ \`${s}\``).join('\n'),
            ``,
            `✅ サイトに反映・Threadsキューに追加済み`,
          ].join('\n');

          const body = JSON.stringify({ content: message });
          const u = new URL(process.env.DISCORD_ARTICLE_WEBHOOK_URL);
          const req = https.request({
            hostname: u.hostname, path: u.pathname,
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) },
          }, res => { res.resume(); console.log(`通知完了 (${res.statusCode})`); });
          req.on('error', e => console.error(e.message));
          req.write(body); req.end();
          EOF
