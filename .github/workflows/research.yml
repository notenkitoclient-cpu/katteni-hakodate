name: リサーチ＆情報収集自動追加

on:
  schedule:
    # 毎朝  7:00 JST (= 22:00 UTC 前日)
    - cron: '0 22 * * *'
    # 毎夕 17:00 JST (= 08:00 UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: '検索開始日 (YYYY-MM-DD)。省略すると昨日。'
        required: false
        default: ''

jobs:
  research:
    name: 函館ネタリサーチ＆承認用PR作成
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 依存パッケージをインストール
        run: npm install exa-js --legacy-peer-deps

      - name: リサーチ実行＆DB保存
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          DISCORD_ARTICLE_WEBHOOK_URL: ${{ secrets.DISCORD_ARTICLE_WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          RESEARCH_START_DATE: ${{ inputs.start_date }}
        run: node scripts/research.mjs

      - name: 処理済みURLをmainにコミット
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"
          git add src/data/research-processed-urls.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: リサーチ処理済みURL更新 [$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')]"
            git push origin main
          else
            echo "URLリストに変更なし。スキップ。"
          fi
