name: 朝のリサーチ

on:
  schedule:
    # 毎朝 7:00 JST (= 22:00 UTC 前日)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  research:
    name: 函館ネタリサーチ
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install exa-js

      - name: リサーチ実行 → Discord に通知
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          DISCORD_ARTICLE_WEBHOOK_URL: ${{ secrets.DISCORD_ARTICLE_WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/research.mjs
