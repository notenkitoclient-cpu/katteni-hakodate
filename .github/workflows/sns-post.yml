name: SNS自動投稿

on:
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**.md'

jobs:
  post:
    name: X・Threadsに投稿
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 新規追加された記事を検出
        id: detect
        run: |
          FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/articles/*.md' | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: 記事メタデータを抽出
        id: meta
        if: steps.detect.outputs.file != ''
        run: |
          FILE="${{ steps.detect.outputs.file }}"
          TITLE=$(grep '^title:' "$FILE" | head -1 | sed 's/title: *"//' | sed 's/"$//' | sed "s/title: *'//;s/'$//")
          DESC=$(grep '^description:' "$FILE" | head -1 | sed 's/description: *"//' | sed 's/"$//' | sed "s/description: *'//;s/'$//")
          SLUG=$(basename "$FILE" .md)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: X（Twitter）に投稿
        if: steps.detect.outputs.file != ''
        env:
          TITLE: ${{ steps.meta.outputs.title }}
          DESC: ${{ steps.meta.outputs.desc }}
          SLUG: ${{ steps.meta.outputs.slug }}
          API_KEY: ${{ secrets.TWITTER_API_KEY }}
          API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          pip install -q requests requests-oauthlib
          python3 - <<'EOF'
          import os, requests
          from requests_oauthlib import OAuth1

          title = os.environ['TITLE']
          desc  = os.environ['DESC']
          slug  = os.environ['SLUG']
          site  = os.environ.get('SITE_URL', 'https://katteni-hakodate.pages.dev')

          text = f"【新着】{title}\n\n{desc[:60]}{'...' if len(desc)>60 else ''}\n\n{site}/articles/{slug}\n\n#函館 #函館グルメ #カッテニハコダテ"

          auth = OAuth1(
            os.environ['API_KEY'],
            os.environ['API_SECRET'],
            os.environ['ACCESS_TOKEN'],
            os.environ['ACCESS_TOKEN_SECRET']
          )
          res = requests.post('https://api.twitter.com/2/tweets', json={'text': text}, auth=auth)
          print(f"X: {res.status_code} {res.text}")

      - name: Threadsに投稿
        if: steps.detect.outputs.file != ''
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          TITLE: ${{ steps.meta.outputs.title }}
          DESC: ${{ steps.meta.outputs.desc }}
          SLUG: ${{ steps.meta.outputs.slug }}
        run: |
          pip install -q requests
          python3 - <<'EOF'
          import os, requests

          title  = os.environ['TITLE']
          desc   = os.environ['DESC']
          slug   = os.environ['SLUG']
          site   = os.environ.get('SITE_URL', 'https://katteni-hakodate.pages.dev')
          token  = os.environ['THREADS_ACCESS_TOKEN']
          uid    = os.environ['THREADS_USER_ID']

          text = f"【新着】{title}\n\n{desc[:60]}{'...' if len(desc)>60 else ''}\n\n{site}/articles/{slug}\n\n#函館 #函館グルメ #カッテニハコダテ"

          # コンテナ作成
          res1 = requests.post(
            f'https://graph.threads.net/v1.0/{uid}/threads',
            params={'media_type': 'TEXT', 'text': text, 'access_token': token}
          )
          print(f"Threads container: {res1.status_code} {res1.text}")
          container_id = res1.json().get('id')

          if container_id:
            # 公開
            res2 = requests.post(
              f'https://graph.threads.net/v1.0/{uid}/threads_publish',
              params={'creation_id': container_id, 'access_token': token}
            )
            print(f"Threads publish: {res2.status_code} {res2.text}")
          EOF
