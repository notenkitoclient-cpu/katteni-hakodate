name: Threads アカウント分析

on:
  workflow_dispatch:  # 手動実行のみ
  schedule:
    - cron: '0 22 * * *'  # 毎朝 JST 7:00 (= UTC 前日 22:00)

jobs:
  analyze:
    name: Threadsアカウントを分析してDiscordに送信
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: 分析実行
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYTICS_WEBHOOK_URL }}
        run: python3 scripts/threads-analyze.py
