name: 【編集部】記事キューを処理

on:
  push:
    branches: [main]
    paths: ['src/content/article-queue.txt']
  workflow_dispatch:

jobs:
  process:
    name: 記事キューの先頭トピックを下書き生成
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 依存パッケージをインストール
        run: npm install @anthropic-ai/sdk exa-js

      - name: キューを確認
        id: queue
        run: |
          if [ ! -s src/content/article-queue.txt ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "キューが空です"
            exit 0
          fi
          TOPIC=$(head -1 src/content/article-queue.txt)
          echo "topic=${TOPIC}" >> $GITHUB_OUTPUT
          echo "empty=false" >> $GITHUB_OUTPUT
          echo "処理トピック: ${TOPIC}"

      - name: 下書きを生成
        if: steps.queue.outputs.empty == 'false'
        id: write
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          DISCORD_ARTICLE_WEBHOOK_URL: ${{ secrets.DISCORD_ARTICLE_WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          TOPIC: ${{ steps.queue.outputs.topic }}
        run: node scripts/write.mjs --topic "${{ steps.queue.outputs.topic }}"

      - name: キューの先頭を削除＆下書きをコミット
        if: steps.queue.outputs.empty == 'false'
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"

          # キューの先頭行を削除
          tail -n +2 src/content/article-queue.txt > /tmp/queue_tmp.txt
          mv /tmp/queue_tmp.txt src/content/article-queue.txt

          git add src/content/drafts/ src/content/article-queue.txt
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            SLUG=$(cat /tmp/draft-result.json 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{ try{ console.log(JSON.parse(d).slug||'') }catch{console.log('')} })" 2>/dev/null || echo "")
            git commit -m "draft: キューから下書き生成${SLUG:+ [$SLUG]} [$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')]"
            git push
            echo "✅ プッシュ完了"
          fi
