name: ニュースをThreads投稿キューに追加

on:
  push:
    branches: [main]
    paths:
      - 'src/content/news/**.md'

jobs:
  enqueue:
    name: キューに追加
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # botのコミット（キュー更新）では実行しない
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 新規ニュースをキューに追加
        run: |
          FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/news/*.md')
          if [ -z "$FILES" ]; then
            echo "新規ニュースなし"
            exit 0
          fi

          echo "キュー追加対象: $(echo "$FILES" | wc -l)件"

          # 現在のキューを読み込む
          QUEUE=$(cat src/data/threads-queue.json)

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            SLUG=$(basename "$FILE" .md)
            echo "キューに追加: $SLUG"
            # jqでスラッグをキューの末尾に追加
            QUEUE=$(echo "$QUEUE" | python3 -c "
          import sys, json
          slug = '$SLUG'
          file = '$FILE'
          q = json.load(sys.stdin)
          if not any(item['slug'] == slug for item in q):
              q.append({'slug': slug, 'file': file})
          print(json.dumps(q, ensure_ascii=False))
          ")
          done <<< "$FILES"

          echo "$QUEUE" > src/data/threads-queue.json
          echo "キュー内容:"
          cat src/data/threads-queue.json

      - name: キューをコミット
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"
          git add src/data/threads-queue.json
          if git diff --staged --quiet; then
            echo "キューに変更なし"
          else
            git commit -m "chore: Threadsキューを更新 [skip ci]"
            git push
          fi
