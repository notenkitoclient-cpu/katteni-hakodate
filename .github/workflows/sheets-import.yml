name: Sheetsからニュースをインポート

on:
  workflow_dispatch:

jobs:
  import:
    name: スプレッドシートからニュースをインポート
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: スプレッドシートからインポート
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
        run: node scripts/sheets-import.mjs

      - name: 新規ニュースをコミット＆プッシュ
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"
          git add src/content/news/ src/data/sheets-processed-ids.json
          if git diff --staged --quiet; then
            echo "新規ニュースなし"
          else
            COUNT=$(git diff --staged --name-only -- 'src/content/news/*.md' | wc -l | tr -d ' ')
            git commit -m "news: Sheetsから${COUNT}件をインポート [$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')]"
            git push
            echo "✅ ${COUNT}件をプッシュ完了"
          fi

      - name: ディレクトリサイト(Vercel)にニュースを送信
        env:
          API_SECRET_TOKEN: ${{ secrets.API_SECRET_TOKEN }}
        run: python3 scripts/send-news-to-api.py
