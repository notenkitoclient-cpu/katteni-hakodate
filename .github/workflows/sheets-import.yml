name: Sheetsからニュースをインポート

on:
  workflow_dispatch:

jobs:
  import:
    name: スプレッドシートからニュースをインポート
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: スプレッドシートからインポート
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
        run: node scripts/sheets-import.mjs

      - name: 新規ニュースをコミット＆プッシュ
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"
          git add src/content/news/ src/data/sheets-processed-ids.json
          if git diff --staged --quiet; then
            echo "新規ニュースなし"
          else
            COUNT=$(git diff --staged --name-only -- 'src/content/news/*.md' | wc -l | tr -d ' ')
            git commit -m "news: Sheetsから${COUNT}件をインポート [$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')]"
            git push
            echo "✅ ${COUNT}件をプッシュ完了"
          fi

      - name: ディレクトリサイト(Vercel)にニュースを送信
        env:
          API_SECRET_TOKEN: ${{ secrets.API_SECRET_TOKEN }}
        run: |
          # 直前のコミットで追加された news/*.md を検出
          FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/news/*.md' 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "新規ニュースなし。API送信をスキップ。"
            exit 0
          fi
          echo "送信対象: $(echo "$FILES" | wc -l | tr -d ' ')件"

          # frontmatter をパースして JSON ペイロードを生成
          python3 - <<'PYEOF'
import os, json, re, sys

result = os.popen("git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/news/*.md' 2>/dev/null").read().strip()
files = [f for f in result.split('\n') if f.strip()]

def parse_fm(text):
    m = re.match(r'^---\s*\n(.*?)\n---', text, re.DOTALL)
    if not m:
        return {}
    out = {}
    for line in m.group(1).split('\n'):
        kv = re.match(r'^(\w+):\s*["\']?(.*?)["\']?\s*$', line)
        if kv:
            out[kv.group(1)] = kv.group(2).strip()
    return out

items = []
for f in files:
    try:
        with open(f) as fh:
            fm = parse_fm(fh.read())
        if not fm.get('title'):
            continue
        items.append({
            'title':        fm.get('title', ''),
            'type':         fm.get('type', 'その他'),
            'area':         fm.get('area', ''),
            'url':          fm.get('source', ''),
            'source':       'Google News',
            'reporter':     fm.get('reporter', '編集部'),
            'published_at': fm.get('date', ''),
        })
    except Exception as e:
        print(f"SKIP {f}: {e}")

if not items:
    print("有効なアイテムなし")
    sys.exit(0)

with open('/tmp/news-payload.json', 'w') as fh:
    json.dump({'items': items}, fh, ensure_ascii=False)
print(f"✅ {len(items)}件のペイロードを生成")
PYEOF

          # 送信
          if [ -f /tmp/news-payload.json ]; then
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://katteni-hakodate.vercel.app/api/news" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${API_SECRET_TOKEN}" \
              -d @/tmp/news-payload.json)
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "レスポンス: HTTP ${HTTP_CODE} — ${BODY}"
            [ "$HTTP_CODE" = "200" ] && echo "✅ 送信完了" || echo "⚠️ 送信失敗（処理は続行）"
          fi
