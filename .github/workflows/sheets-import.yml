name: Sheetsからニュースをインポート

on:
  schedule:
    # 毎朝 8:00 JST (= 23:00 UTC 前日) と 毎夕 18:00 JST (= 09:00 UTC)
    - cron: '0 23 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  import:
    name: スプレッドシートからニュースをインポート（承認用PR作成）
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: スプレッドシートからインポート
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          API_SECRET_TOKEN: ${{ secrets.API_SECRET_TOKEN }}
        run: node scripts/sheets-import.mjs

      - name: 処理済みIDをmainにコミット（再処理防止）
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"
          git add src/data/sheets-processed-ids.json
          if git diff --staged --quiet; then
            echo "処理済みIDに変更なし"
          else
            git commit -m "chore: sheets処理済みID更新 [$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')]"
            git push
          fi

      - name: 候補ニュースをPRとして作成（要承認）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p src/content/news/
          git add src/content/news/
          if git diff --staged --quiet; then
            echo "新規ニュースなし。スキップ。"
            exit 0
          fi
          COUNT=$(git diff --staged --name-only -- 'src/content/news/*.md' | wc -l | tr -d ' ')
          BRANCH="news-draft/sheets-$(TZ=Asia/Tokyo date +'%Y-%m-%d-%H%M')"
          git checkout -b "$BRANCH"
          git commit -m "draft: Sheets候補 ${COUNT}件 [$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')]"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "📋 Sheets候補 $(TZ=Asia/Tokyo date +'%Y-%m-%d'): ${COUNT}件" \
            --body "$(printf 'Sheetsからインポートしたニュース候補です。\n\n不要な記事のファイルを削除してからマージしてください。\nマージ後にThreadsへの自動投稿が行われます。')"
          echo "✅ PR作成完了: ${COUNT}件"
