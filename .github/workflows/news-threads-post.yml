name: ニュース情報をThreadsに自動投稿

on:
  push:
    branches: [main]
    paths:
      - 'src/content/news/**.md'

jobs:
  post:
    name: Threadsに投稿
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 新規追加されたニュースを検出
        id: detect
        run: |
          FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/news/*.md' | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: ニュースメタデータを抽出
        id: meta
        if: steps.detect.outputs.file != ''
        run: |
          FILE="${{ steps.detect.outputs.file }}"
          TITLE=$(grep '^title:' "$FILE" | head -1 | sed 's/title: *"//' | sed 's/"$//')
          TYPE=$(grep '^type:' "$FILE" | head -1 | sed 's/type: *"//' | sed 's/"$//')
          AREA=$(grep '^area:' "$FILE" | head -1 | sed 's/area: *"//' | sed 's/"$//')
          SLUG=$(basename "$FILE" .md)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "area=$AREA" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Threadsに投稿
        if: steps.detect.outputs.file != ''
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          TITLE: ${{ steps.meta.outputs.title }}
          TYPE: ${{ steps.meta.outputs.type }}
          AREA: ${{ steps.meta.outputs.area }}
          SLUG: ${{ steps.meta.outputs.slug }}
        run: |
          pip install -q requests
          python3 - <<'EOF'
          import os, requests

          title = os.environ['TITLE']
          type_ = os.environ['TYPE']
          area  = os.environ['AREA']
          slug  = os.environ['SLUG']
          site  = os.environ.get('SITE_URL', 'https://kattenihakodate.com')
          token = os.environ['THREADS_ACCESS_TOKEN']
          uid   = os.environ['THREADS_USER_ID']

          TYPE_EMOJI = {
            '開店': '🟢', '閉店': '⚫', '工事中': '🟡',
            'イベント': '🔴', '目撃情報': '🔵', 'その他': '⚪',
          }
          emoji = TYPE_EMOJI.get(type_, '📋')

          text = (
            f"{emoji}【{type_}】{title}\n\n"
            f"📍 {area}\n\n"
            f"詳細はこちら→ {site}/news/{slug}\n\n"
            f"#函館 #函館情報 #函館開店 #函館閉店 #カッテニハコダテ"
          )

          # コンテナ作成
          res1 = requests.post(
            f'https://graph.threads.net/v1.0/{uid}/threads',
            params={'media_type': 'TEXT', 'text': text, 'access_token': token}
          )
          print(f"Threads container: {res1.status_code} {res1.text}")
          container_id = res1.json().get('id')

          if container_id:
            res2 = requests.post(
              f'https://graph.threads.net/v1.0/{uid}/threads_publish',
              params={'creation_id': container_id, 'access_token': token}
            )
            print(f"Threads publish: {res2.status_code} {res2.text}")
          EOF
