name: ニュース情報をThreadsに自動投稿

on:
  push:
    branches: [main]
    paths:
      - 'src/content/news/**.md'

jobs:
  post:
    name: Threadsに投稿
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 新規追加されたニュースを全件検出＆Threadsに投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/news/*.md')
          if [ -z "$FILES" ]; then
            echo "新規ニュースなし"
            exit 0
          fi

          echo "投稿対象: $(echo "$FILES" | wc -l)件"
          pip install -q requests

          # fd3 でファイルリストを読む（stdin=fd0 はヒアドキュメント用に確保）
          while IFS= read -r FILE <&3; do
            [ -z "$FILE" ] && continue
            echo "処理中: $FILE"
            TITLE=$(grep '^title:' "$FILE" | head -1 | sed 's/title: *"//' | sed 's/"$//')
            TYPE=$(grep '^type:' "$FILE" | head -1 | sed 's/type: *"//' | sed 's/"$//')
            AREA=$(grep '^area:' "$FILE" | head -1 | sed 's/area: *"//' | sed 's/"$//')
            SLUG=$(basename "$FILE" .md)

            python3 - <<PYEOF
          import os, requests, time

          title = """$TITLE"""
          type_ = """$TYPE"""
          area  = """$AREA"""
          slug  = """$SLUG"""
          site  = os.environ.get('SITE_URL', 'https://kattenihakodate.com')
          token = os.environ['THREADS_ACCESS_TOKEN']
          uid   = os.environ['THREADS_USER_ID']

          TYPE_EMOJI = {
            '開店': '🟢', '閉店': '⚫', '工事中': '🟡',
            'イベント': '🔴', '目撃情報': '🔵', 'その他': '⚪',
          }
          emoji = TYPE_EMOJI.get(type_, '📋')

          text = (
            f"{emoji}【{type_}】{title}\n\n"
            f"📍 {area}\n\n"
            f"詳細はこちら→ {site}/news/{slug}\n\n"
            f"#函館 #函館情報 #函館開店 #函館閉店 #カッテニハコダテ"
          )

          res1 = requests.post(
            f'https://graph.threads.net/v1.0/{uid}/threads',
            params={'media_type': 'TEXT', 'text': text, 'access_token': token}
          )
          print(f"container {slug}: {res1.status_code}")
          container_id = res1.json().get('id')
          if container_id:
            time.sleep(3)
            res2 = requests.post(
              f'https://graph.threads.net/v1.0/{uid}/threads_publish',
              params={'creation_id': container_id, 'access_token': token}
            )
            print(f"publish {slug}: {res2.status_code}")
          else:
            print(f"ERROR: container作成失敗 {res1.text}")
          PYEOF

          done 3< <(echo "$FILES")
