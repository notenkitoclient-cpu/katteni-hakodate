name: 【収集部】SNSキュー処理

on:
  push:
    branches: [main]
    paths: ['src/content/sns-queue/**']
  workflow_dispatch:

jobs:
  process:
    name: SNSキューの画像をニュースに変換
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 依存パッケージをインストール
        run: npm install @anthropic-ai/sdk

      - name: SNSキューを処理
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/sns-queue-process.mjs

      - name: 結果をコミット＆プッシュ
        id: commit
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"
          git add src/content/news/ src/content/sns-queue/
          if git diff --staged --quiet; then
            echo "created=false" >> $GITHUB_OUTPUT
            echo "新規ニュースなし"
          else
            COUNT=$(git diff --staged --name-only -- 'src/content/news/*.md' | wc -l | tr -d ' ')
            git commit -m "news: SNSキューから${COUNT}件のニュースを生成 [$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')]"
            git push
            echo "created=true" >> $GITHUB_OUTPUT
            echo "✅ ${COUNT}件をプッシュ完了"
          fi

      - name: Discordに通知
        if: steps.commit.outputs.created == 'true'
        env:
          DISCORD_ARTICLE_WEBHOOK_URL: ${{ secrets.DISCORD_ARTICLE_WEBHOOK_URL }}
        run: |
          node - <<'EOF'
          import fs from 'fs';
          import https from 'https';

          const result = JSON.parse(fs.readFileSync('/tmp/sns-queue-result.json', 'utf-8'));
          if (!result.created?.length) process.exit(0);

          const message = [
            `📱 **SNSキューから${result.created.length}件のニュースを取り込みました**`,
            result.created.map(s => `・ \`${s}\``).join('\n'),
          ].join('\n');

          const body = JSON.stringify({ content: message });
          const u = new URL(process.env.DISCORD_ARTICLE_WEBHOOK_URL);
          const req = https.request({
            hostname: u.hostname, path: u.pathname,
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) },
          }, res => { res.resume(); console.log(`通知完了 (${res.statusCode})`); });
          req.on('error', e => console.error(e.message));
          req.write(body); req.end();
          EOF
