name: Threads時間差投稿（毎時1件）

on:
  schedule:
    # 毎時0分に実行 (UTC) = JST 毎時9分
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  post:
    name: キューから1件投稿
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: キューから1件取り出してThreadsに投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          QUEUE=$(cat src/data/threads-queue.json)
          COUNT=$(echo "$QUEUE" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")

          if [ "$COUNT" -eq 0 ]; then
            echo "キューが空です。投稿をスキップ。"
            exit 0
          fi

          echo "キュー残: ${COUNT}件 → 先頭1件を投稿"
          pip install -q requests

          python3 - <<PYEOF
          import os, json, requests, time

          with open('src/data/threads-queue.json') as f:
              queue = json.load(f)

          item = queue[0]
          slug = item['slug']
          file_path = item['file']

          # ニュースファイルを読む
          try:
              with open(file_path, encoding='utf-8') as f:
                  content = f.read()
          except FileNotFoundError:
              print(f"ファイルが見つかりません: {file_path}。キューから削除します。")
              queue.pop(0)
              with open('src/data/threads-queue.json', 'w') as f:
                  json.dump(queue, f, ensure_ascii=False)
              exit(0)

          def get_field(content, key):
              for line in content.split('\n'):
                  if line.startswith(f'{key}:'):
                      return line.split(':', 1)[1].strip().strip('"')
              return ''

          # 未来日付なら今日の日付に書き換えてサイトに表示されるようにする
          from datetime import date as date_cls
          today_str = date_cls.today().isoformat()
          item_date = get_field(content, 'date')
          if item_date > today_str:
              content = content.replace(f'date: "{item_date}"', f'date: "{today_str}"', 1)
              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"日付を {item_date} → {today_str} に更新")

          title = get_field(content, 'title')
          type_ = get_field(content, 'type')
          area  = get_field(content, 'area')

          site  = os.environ.get('SITE_URL', 'https://kattenihakodate.com')
          token = os.environ['THREADS_ACCESS_TOKEN']
          uid   = os.environ['THREADS_USER_ID']

          TYPE_EMOJI = {
              '開店': '🟢', '閉店': '⚫', '工事中': '🟡',
              'イベント': '🔴', '目撃情報': '🔵', 'その他': '⚪',
          }
          emoji = TYPE_EMOJI.get(type_, '📋')

          text = (
              f"{emoji}【{type_}】{title}\n\n"
              f"📍 {area}\n\n"
              f"詳細はこちら→ {site}/news\n\n"
              f"#函館 #函館情報 #函館開店 #函館閉店 #カッテニハコダテ"
          )

          res1 = requests.post(
              f'https://graph.threads.net/v1.0/{uid}/threads',
              params={'media_type': 'TEXT', 'text': text, 'access_token': token}
          )
          print(f"container: {res1.status_code}")
          container_id = res1.json().get('id')

          if container_id:
              time.sleep(3)
              res2 = requests.post(
                  f'https://graph.threads.net/v1.0/{uid}/threads_publish',
                  params={'creation_id': container_id, 'access_token': token}
              )
              print(f"publish {slug}: {res2.status_code}")
              # 成功したらキューから削除
              queue.pop(0)
              with open('src/data/threads-queue.json', 'w') as f:
                  json.dump(queue, f, ensure_ascii=False)
              print(f"✅ 投稿完了: {slug} (残り{len(queue)}件)")
          else:
              print(f"❌ container作成失敗: {res1.text}")
              exit(1)
          PYEOF

      - name: キューをコミット
        run: |
          git config user.name  "KatteniHakodate Bot"
          git config user.email "bot@katteni-hakodate.local"
          git add src/data/threads-queue.json src/content/news/
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: Threadsキューを更新（投稿済み削除） [skip ci]"
            git push
          fi
